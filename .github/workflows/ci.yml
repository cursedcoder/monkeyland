name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Lint (typecheck)
        run: npm run lint

      - name: Frontend tests
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Validation script
        run: npm run validate:no-errors

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Rust clippy (warning baseline)
        run: >
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --
          -D warnings
          -A dead_code
          -A unused_imports
          -A unused_mut
          -A dropping_references
          -A clippy::let_unit_value
          -A clippy::type_complexity
          -A clippy::len_zero
          -A clippy::needless_question_mark
          -A clippy::unnecessary_map_or
          -A clippy::redundant_guards
          -A clippy::too_many_arguments

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
